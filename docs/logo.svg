<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blissGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="blissGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer diamond frame -->
  <polygon points="100,10 190,100 100,190 10,100" 
    fill="none" 
    stroke="url(#blissGrad)" 
    stroke-width="4" 
    stroke-linejoin="round"
    filter="url(#glow)"/>
  
  <!-- Inner diamond -->
  <polygon points="100,30 170,100 100,170 30,100" 
    fill="none" 
    stroke="url(#blissGrad)" 
    stroke-width="1.5" 
    stroke-opacity="0.4"
    stroke-linejoin="round"/>
  
  <!-- Cross lines forming B shape -->
  <line x1="100" y1="10" x2="100" y2="190" 
    stroke="url(#blissGrad)" 
    stroke-width="3" 
    stroke-linecap="round"
    filter="url(#glow)"/>
  
  <line x1="10" y1="100" x2="100" y2="100" 
    stroke="url(#blissGrad)" 
    stroke-width="3" 
    stroke-linecap="round"
    filter="url(#glow)"/>
  
  <!-- Upper right diagonal (B top curve suggestion) -->
  <line x1="100" y1="100" x2="170" y2="55" 
    stroke="url(#blissGrad)" 
    stroke-width="3" 
    stroke-linecap="round"
    filter="url(#glow)"/>
  
  <!-- Lower right diagonal (B bottom curve suggestion) -->
  <line x1="100" y1="100" x2="170" y2="145" 
    stroke="url(#blissGrad)" 
    stroke-width="3" 
    stroke-linecap="round"
    filter="url(#glow)"/>
  
  <!-- Center node dot -->
  <circle cx="100" cy="100" r="8" fill="url(#blissGrad)" filter="url(#glow)"/>
  
  <!-- Corner accent dots -->
  <circle cx="100" cy="10" r="3" fill="#a855f7"/>
  <circle cx="190" cy="100" r="3" fill="#6366f1"/>
  <circle cx="100" cy="190" r="3" fill="#a855f7"/>
  <circle cx="10" cy="100" r="3" fill="#6366f1"/>
</svg>